apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: frontend
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - image: nexus-ai-frontend:local
        name: frontend
        envFrom:
        - configMapRef:
            name: nexus-config
        ports:
        - containerPort: 3000
