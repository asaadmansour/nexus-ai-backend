apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ai-service
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - image: nexus-ai-service:local
        name: ai-service
        ports:
        - containerPort: 8000
