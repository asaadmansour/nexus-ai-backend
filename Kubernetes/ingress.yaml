apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # cert-manager fills nexus-tls automatically
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - nexus-ai-freelance.duckdns.org
    secretName: nexus-tls
  rules:
  - host: nexus-ai-freelance.duckdns.org
    http:
      paths:
      # /api goes to the backend (it already serves under the /api prefix — no rewrite)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3000
      # everything else goes to the frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
