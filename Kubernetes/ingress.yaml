apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
spec:
  ingressClassName: nginx
  # For the DuckDNS step later, add a host under rules:  host: yourname.duckdns.org
  rules:
  - http:
      paths:
      # /api goes to the backend (it already serves under the /api prefix — no rewrite)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3000
      # everything else goes to the frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
