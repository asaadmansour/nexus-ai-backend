---
# Configure the Jenkins EC2 host: Java, Docker, Jenkins, kubectl, awscli
- name: Set up Jenkins server
  hosts: jenkins
  become: true
  tasks:
    - name: Install base packages
      apt:
        name: [openjdk-21-jre-headless, docker.io, git, unzip, gnupg]
        update_cache: true

    - name: Make Java 21 the default (Jenkins requires Java 21)
      shell: update-alternatives --set java /usr/lib/jvm/java-21-openjdk-amd64/bin/java

    # The apt 'awscli' is v1 and writes a v1alpha1 kubeconfig that new kubectl rejects.
    # AWS CLI v2 writes v1beta1, which kubectl 1.31 accepts.
    - name: Download AWS CLI v2
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: "0644"

    - name: Unzip AWS CLI v2
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true

    - name: Install AWS CLI v2
      shell: /tmp/aws/install --update
      args:
        creates: /usr/local/bin/aws

    - name: Fetch the Jenkins signing key into a keyring
      shell: >
        gpg --batch --yes --no-default-keyring
        --keyring /usr/share/keyrings/jenkins-keyring.gpg
        --keyserver hkps://keyserver.ubuntu.com
        --recv-keys 7198F4B714ABFC68

    - name: Add Jenkins apt repo (single, clean entry)
      copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        content: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/\n"
        mode: "0644"

    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install Jenkins
      apt:
        name: jenkins
        update_cache: true

    - name: Let the jenkins user run docker
      user:
        name: jenkins
        groups: docker
        append: true

    - name: Install kubectl
      get_url:
        url: https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: Start and enable Docker and Jenkins
      service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: [docker, jenkins]

    # Nightly cleanup so image/build-cache buildup never fills the disk again
    - name: Schedule a daily Docker prune (3 AM)
      cron:
        name: docker-prune
        hour: "3"
        minute: "0"
        job: "docker system prune -af >> /var/log/docker-prune.log 2>&1"
